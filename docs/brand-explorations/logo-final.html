<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JotilLabs — Official Logo (Final Reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    font-family: 'Montserrat Alternates', sans-serif;
  }

  .half {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    position: relative;
  }
  .light-half { background: #ffffff; }
  .dark-half { background: #0f1129; }

  .mode-label {
    position: absolute;
    top: 24px;
    left: 28px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .light-half .mode-label { color: #ccc; }
  .dark-half .mode-label { color: #1e2245; }

  .logo-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: stackIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .dark-half .logo-stack { animation-delay: 0.1s; }
  @keyframes stackIn {
    from { opacity: 0; transform: translateY(16px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .mark { width: 140px; height: 158px; }
  .mark svg { width: 100%; height: 100%; overflow: visible; }

  .wordmark {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    text-align: center;
  }

  .light-half .jotil { color: #0f1129; }
  .light-half .labs { color: #3859a8; }
  .dark-half .jotil { color: #ffffff; }
  .dark-half .labs { color: #8ca3cc; }

  .tagline {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
  }
  .light-half .tagline { color: #8ca3cc; }
  .dark-half .tagline { color: rgba(255,255,255,0.2); }

  /* Heartbeat dots with long pause */
  .hb1 { animation: heartbeat 10s ease-in-out infinite 0s; transform-box: fill-box; transform-origin: center; }
  .hb2 { animation: heartbeat 10s ease-in-out infinite 0.15s; transform-box: fill-box; transform-origin: center; }
  .hb3 { animation: heartbeat 10s ease-in-out infinite 0.3s; transform-box: fill-box; transform-origin: center; }
  @keyframes heartbeat {
    0% { transform: scale(1); opacity: 0.55; }
    3% { transform: scale(1.3); opacity: 1; }
    5% { transform: scale(1); opacity: 0.7; }
    7% { transform: scale(1.2); opacity: 1; }
    10% { transform: scale(1); opacity: 0.55; }
    100% { transform: scale(1); opacity: 0.55; }
  }

  .divider {
    position: fixed;
    top: 0; left: 50%;
    width: 1px; height: 100vh;
    background: rgba(128,128,128,0.1);
    z-index: 10;
  }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    .half { min-height: 50vh; }
    .divider { display: none; }
  }
</style>
</head>
<body>

<div class="divider"></div>

<div class="half light-half">
  <div class="mode-label">Light</div>
  <div class="logo-stack">
    <div class="mark" id="lightMark"></div>
    <div class="wordmark">
      <span class="jotil">Jotil</span><span class="labs">Labs</span>
    </div>
    <div class="tagline">Automate. Empower. Scale.</div>
  </div>
</div>

<div class="half dark-half">
  <div class="mode-label">Dark</div>
  <div class="logo-stack">
    <div class="mark" id="darkMark"></div>
    <div class="wordmark">
      <span class="jotil">Jotil</span><span class="labs">Labs</span>
    </div>
    <div class="tagline">Automate. Empower. Scale.</div>
  </div>
</div>
